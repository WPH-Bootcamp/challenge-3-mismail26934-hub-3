<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 3 - Landing Page</title>
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body class="body">
    <!-- ========== NAVBAR ========== -->
    <header class="header">
      <div class="header-div">
        <h1 class="logo">Tech.</h1>
        <!-- Desktop Menu -->
        <nav class="navbar">
          <a href="#" class="li">About</a>
          <a href="#" class="li">Service</a>
          <a href="#" class="li">Our Work</a>
          <a href="#" class="li">Team</a>
        </nav>
        <button class="hidden md:block btn-primary w-40 h-11">
          Contact Us
        </button>
        <!-- Mobile Button -->
        <button id="menu-btn" class="md:hidden">
          <img src="../assets/images/menu-01.png" alt="Tech." />
        </button>
      </div>
      <!-- Mobile Menu -->
      <div
        id="menu"
        class="hidden flex-col bg-black px-6 pb-6 space-y-4 md:hidden"
      >
        <a href="#" class="li">About</a>
          <a href="#" class="li">Service</a>
          <a href="#" class="li">Our Work</a>
          <a href="#" class="li">Team</a>
        <button class="hidden md:block btn-primary w-40 h-11">
      </div>
    </header>
    <!-- ========== HERO SECTION ========== -->
    <!-- Hero -->
    <section
      class="bg-linear-to-b/display-p3 from-black to-deep to-30% min-h-screen text-left h-180 md:h-175 py-10 
      px-5 gap-4.5 md:px-35"
    >
      <div
        class="grid md:grid-cols-2 items-center"
      >
        <div>
          <h2 class="text-5xl text-left font-bold tracking-tight mb-4 md:text-display-3xl md:w-auto md:tracking-[-0.03em]">
            Build with the <span class="italic">Future.</span>
          </h2>
          <p class="text-neutral text-left font-normal text-base/[30px] tracking-[-0.03em] w-auto md:text-display-2xl">
            From building sleek websites and mobile apps to integrating AI solutions, 
            we help brands turn ideas into powerful digital experiences that connect, 
            engage, and scale.
          </p>  
          <button class="mt-8 p-2 btn-primary w-[354px] md:w-[300px]">
            Let's Talk
          </button>
        </div>
        <div class="w-[306.47271728515625px] h-auto md:w-auto md:h-auto">
          <img src="../assets/images/Group 15861.png" class="" />
        </div>
      </div>
    </section>
    <!-- ========== FOOTER ========== -->
      <!-- SCRIPT -->
    <script>
      const btn = document.getElementById('menu-btn');
      const menu = document.getElementById('menu');
      btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
      });
    </script>
  </body>
</html>
